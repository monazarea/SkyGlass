name: iOS CI/CD Pipeline

# 1. Trigger: When should this run?
on:
  push:
    branches: [ "main" ] # Runs every time you push to the 'main' branch

jobs:
  build:
    name: Build iOS App
    # 2. Server: What machine should GitHub use?
    runs-on: macos-latest

    steps:
      # Step 1: Download your code onto the GitHub server
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Select the correct Xcode version
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4' # Matches your local Xcode 16.4

      # Step 3: Run your Fastlane magic!
      - name: Run Fastlane Build
        run: fastlane build_skyglass